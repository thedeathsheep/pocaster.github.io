name: Deploy farawayfromicu to Windows Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: farawayfromicu-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FARAWAY_SSH_HOST: ${{ secrets.FARAWAY_SSH_HOST }}
      FARAWAY_SSH_USER: ${{ secrets.FARAWAY_SSH_USER }}
      FARAWAY_SSH_KEY: ${{ secrets.FARAWAY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Package site
        shell: pwsh
        run: |
          if (Test-Path "./site.zip") {
            Remove-Item "./site.zip" -Force
          }
          Compress-Archive -Path "./_site/*" -DestinationPath "./site.zip" -Force
          Get-Item "./site.zip" | Select-Object FullName, Length

      - name: Prepare SSH key and known hosts
        shell: pwsh
        run: |
          $sshDir = Join-Path $HOME ".ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null

          $keyPath = Join-Path $env:RUNNER_TEMP "farawayfromicu_deploy_key"
          Set-Content -Path $keyPath -Value $env:FARAWAY_SSH_KEY -NoNewline
          & chmod 600 $keyPath

          $knownHosts = Join-Path $sshDir "known_hosts"
          ssh-keyscan -H $env:FARAWAY_SSH_HOST | Out-File -FilePath $knownHosts -Append -Encoding ascii

      - name: Upload archive
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "farawayfromicu_deploy_key"
          $remoteTarget = "$($env:FARAWAY_SSH_USER)@$($env:FARAWAY_SSH_HOST)"
          $batchPath = Join-Path $env:RUNNER_TEMP "farawayfromicu-upload.sftp"
          @(
            "put ./site.zip /C:/inetpub/wwwroot/site.zip"
          ) | Set-Content -Path $batchPath
          & sftp -i $keyPath -o StrictHostKeyChecking=yes -b $batchPath $remoteTarget

      - name: Upload deploy script
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "farawayfromicu_deploy_key"
          $remoteTarget = "$($env:FARAWAY_SSH_USER)@$($env:FARAWAY_SSH_HOST)"
          $batchPath = Join-Path $env:RUNNER_TEMP "farawayfromicu-script-upload.sftp"
          $remoteScriptPath = Join-Path $env:RUNNER_TEMP "deploy-farawayfromicu.ps1"
          $remoteScript = @'
          $ErrorActionPreference = 'Stop'

          function Copy-DirectoryContents {
              param(
                  [Parameter(Mandatory = $true)][string]$Source,
                  [Parameter(Mandatory = $true)][string]$Destination
              )

              if (!(Test-Path $Destination)) {
                  New-Item -ItemType Directory -Force -Path $Destination | Out-Null
              }

              Get-ChildItem -LiteralPath $Source -Force | ForEach-Object {
                  Copy-Item -LiteralPath $_.FullName -Destination $Destination -Recurse -Force
              }
          }

          function Clear-ManagedSite {
              param(
                  [Parameter(Mandatory = $true)][string]$Path,
                  [string[]]$Preserve = @()
              )

              if (!(Test-Path $Path)) {
                  return
              }

              Get-ChildItem -LiteralPath $Path -Force | Where-Object {
                  $Preserve -notcontains $_.Name
              } | ForEach-Object {
                  Remove-Item -LiteralPath $_.FullName -Recurse -Force
              }
          }

          $siteRoot = 'C:\inetpub\wwwroot\farawayfromicu'
          $backupRoot = 'C:\inetpub\wwwroot\_deploy_backups'
          $stagingRoot = 'C:\inetpub\wwwroot\_deploy_staging'
          $archive = 'C:\inetpub\wwwroot\site.zip'
          $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $backupPath = Join-Path $backupRoot "farawayfromicu-$timestamp"
          $stagingPath = Join-Path $stagingRoot "farawayfromicu-$timestamp"
          $preserve = @('web.config')

          New-Item -ItemType Directory -Force -Path $backupRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $stagingRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $siteRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $stagingPath | Out-Null

          try {
              tar -xf $archive -C $stagingPath

              if (!(Test-Path (Join-Path $stagingPath 'index.html'))) {
                  throw 'Deployment archive is missing index.html after extraction.'
              }

              New-Item -ItemType Directory -Force -Path $backupPath | Out-Null
              Copy-DirectoryContents -Source $siteRoot -Destination $backupPath

              try {
                  Clear-ManagedSite -Path $siteRoot -Preserve $preserve
                  Copy-DirectoryContents -Source $stagingPath -Destination $siteRoot
              }
              catch {
                  Clear-ManagedSite -Path $siteRoot -Preserve $preserve
                  Copy-DirectoryContents -Source $backupPath -Destination $siteRoot
                  throw
              }
          }
          finally {
              if (Test-Path $archive) {
                  Remove-Item -LiteralPath $archive -Force
              }
              if (Test-Path $stagingPath) {
                  Remove-Item -LiteralPath $stagingPath -Recurse -Force
              }
          }
          '@

          Set-Content -Path $remoteScriptPath -Value $remoteScript
          @(
            "put $remoteScriptPath /C:/inetpub/wwwroot/deploy-farawayfromicu.ps1"
          ) | Set-Content -Path $batchPath
          & sftp -i $keyPath -o StrictHostKeyChecking=yes -b $batchPath $remoteTarget

      - name: Backup and deploy on Windows Server
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "farawayfromicu_deploy_key"
          $remoteTarget = "$($env:FARAWAY_SSH_USER)@$($env:FARAWAY_SSH_HOST)"
          & ssh -i $keyPath -o StrictHostKeyChecking=yes $remoteTarget "powershell -NoProfile -ExecutionPolicy Bypass -File C:\inetpub\wwwroot\deploy-farawayfromicu.ps1"

      - name: Cleanup deploy script on Windows Server
        if: always()
        shell: pwsh
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "farawayfromicu_deploy_key"
          $remoteTarget = "$($env:FARAWAY_SSH_USER)@$($env:FARAWAY_SSH_HOST)"
          & ssh -i $keyPath -o StrictHostKeyChecking=yes $remoteTarget "cmd /c del /f /q C:\inetpub\wwwroot\deploy-farawayfromicu.ps1"
